<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>emberviewer</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #0e0e10; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    #loading {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      color: #d9772b; font-family: system-ui, sans-serif; font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <canvas id="the_canvas_id"></canvas>
  <div id="loading">Loading emberviewer…</div>
  <script type="module">
    import init from './emberviewer.js';
    init()
      .then(() => { const l = document.getElementById('loading'); if (l) l.remove(); })
      .catch((e) => { document.getElementById('loading').textContent = 'Failed to load: ' + e; });
  </script>
</body>
</html>
