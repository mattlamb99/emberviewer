name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: emberviewer

jobs:
  # Build the browser (wasm) UI bundle once. It is OS-independent, so the three
  # native release jobs download it and embed it (rust-embed) — otherwise their
  # binaries would ship the build.rs placeholder page instead of the real web UI.
  web-bundle:
    name: web bundle (wasm)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain (+ wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo & target
        uses: Swatinem/rust-cache@v2

      - name: Resolve wasm-bindgen version (must match the crate)
        id: wb
        run: |
          v=$(awk '/^name = "wasm-bindgen"$/{f=1} f && /^version = /{gsub(/[",]/,"",$3); print $3; exit}' Cargo.lock)
          test -n "$v" || { echo "could not resolve wasm-bindgen version from Cargo.lock" >&2; exit 1; }
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "wasm-bindgen $v"

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@${{ steps.wb.outputs.version }}

      - name: Build web bundle
        run: bash scripts/build-web.sh

      - name: Upload web bundle
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: crates/emberviewer/web-dist/
          if-no-files-found: error

  release:
    name: release (${{ matrix.os }})
    needs: web-bundle
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build the Linux binary on the oldest supported runner (glibc 2.35) so
          # it also runs on older-but-current distros (Ubuntu 22.04, Debian 12).
          # ubuntu-latest is 24.04 (glibc 2.39), which won't run on glibc < 2.39.
          - os: ubuntu-22.04
            target_os: linux
          # macos-latest is Apple Silicon (arm64); macos-13 is the Intel (x86_64)
          # runner — a native build on each, named by `uname -m`.
          - os: macos-latest
            target_os: macos
          - os: macos-13
            target_os: macos
          - os: windows-latest
            target_os: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libgl1-mesa-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo & target
        uses: Swatinem/rust-cache@v2

      - name: Download web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: crates/emberviewer/web-dist/

      - name: Build release binary
        run: cargo build --release --package emberviewer

      - name: Determine arch
        id: arch
        shell: bash
        run: echo "arch=$(uname -m)" >> "$GITHUB_OUTPUT"

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ASSET="${BIN_NAME}-${{ matrix.target_os }}-${{ steps.arch.outputs.arch }}.tar.gz"
          tar -czvf "$ASSET" -C target/release "$BIN_NAME"
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          ASSET="${BIN_NAME}-${{ matrix.target_os }}-${{ steps.arch.outputs.arch }}.zip"
          7z a "$ASSET" "./target/release/${BIN_NAME}.exe"
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
